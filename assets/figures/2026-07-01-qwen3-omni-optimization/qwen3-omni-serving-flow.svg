<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="440" viewBox="0 0 1280 440" role="img" aria-labelledby="title desc">
  <title id="title">Qwen3-Omni three-stage serving flow in vLLM-Omni</title>
  <desc id="desc">Text, image, audio, and video inputs feed Thinker, then Talker and Code2Wav produce text and audio outputs.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 24px system-ui, -apple-system, Segoe UI, sans-serif; fill: #111827; }
      .stage-tag { font: 700 20px system-ui, -apple-system, Segoe UI, sans-serif; fill: #1f2937; }
      .stage-name { font: 700 28px system-ui, -apple-system, Segoe UI, sans-serif; fill: #1f2937; }
      .stage-sub { font: 500 17px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .node-text { font: 700 16px system-ui, -apple-system, Segoe UI, sans-serif; fill: #1f2937; }
      .input-label { font: 600 13px system-ui, -apple-system, Segoe UI, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 6; }
      .panel { fill: #fbf6ef; stroke: #eee1d2; }
      .input { fill: #e8eef7; stroke: #b8c7dc; }
      .thinker { fill: #bfe7c7; stroke: #56b879; }
      .talker { fill: #f6c28b; stroke: #e39a4a; }
      .code2wav { fill: #bfe7c7; stroke: #56b879; }
      .output { fill: #f7d39d; stroke: #dd9b48; }
    </style>
  </defs>

  <rect x="20" y="15" width="1240" height="410" rx="20" class="panel"/>
  <text x="50" y="58" class="title">Qwen3-Omni serving flow</text>

  <!-- Inputs -->
  <rect x="56" y="118" width="104" height="34" rx="8" class="input"/>
  <text x="82" y="140" class="input-label">Text</text>

  <rect x="56" y="162" width="104" height="34" rx="8" class="input"/>
  <text x="78" y="184" class="input-label">Image</text>

  <rect x="56" y="206" width="104" height="34" rx="8" class="input"/>
  <text x="78" y="228" class="input-label">Audio</text>

  <rect x="56" y="250" width="104" height="34" rx="8" class="input"/>
  <text x="78" y="272" class="input-label">Video</text>

  <!-- Stages -->
  <rect x="240" y="96" width="290" height="192" rx="16" class="thinker"/>
  <text x="385" y="138" text-anchor="middle" class="stage-tag">Stage 0</text>
  <text x="385" y="200" text-anchor="middle" class="stage-name">Thinker</text>
  <text x="385" y="238" text-anchor="middle" class="stage-sub">reasoning + text</text>

  <rect x="580" y="96" width="290" height="192" rx="16" class="talker"/>
  <text x="725" y="138" text-anchor="middle" class="stage-tag">Stage 1</text>
  <text x="725" y="200" text-anchor="middle" class="stage-name">Talker</text>
  <text x="725" y="238" text-anchor="middle" class="stage-sub">RVQ codec codes</text>

  <rect x="920" y="96" width="290" height="192" rx="16" class="code2wav"/>
  <text x="1065" y="138" text-anchor="middle" class="stage-tag">Stage 2</text>
  <text x="1065" y="200" text-anchor="middle" class="stage-name">Code2Wav</text>
  <text x="1065" y="238" text-anchor="middle" class="stage-sub">waveform audio</text>

  <!-- Outputs -->
  <rect x="335" y="330" width="100" height="46" rx="10" class="output"/>
  <text x="385" y="359" text-anchor="middle" class="node-text">Text</text>

  <rect x="1015" y="330" width="100" height="46" rx="10" class="output"/>
  <text x="1065" y="359" text-anchor="middle" class="node-text">Audio</text>

  <!-- Input → Thinker (gap from box edges) -->
  <path class="arrow" d="M 172 135 L 228 135"/>
  <path class="arrow" d="M 172 179 L 228 179"/>
  <path class="arrow" d="M 172 223 L 228 223"/>
  <path class="arrow" d="M 172 267 L 228 267"/>

  <!-- Stage pipeline -->
  <path class="arrow" d="M 544 192 L 566 192"/>
  <path class="arrow" d="M 884 192 L 906 192"/>

  <!-- Outputs -->
  <path class="arrow dash" d="M 385 302 L 385 318"/>
  <path class="arrow" d="M 1065 302 L 1065 318"/>
</svg>
