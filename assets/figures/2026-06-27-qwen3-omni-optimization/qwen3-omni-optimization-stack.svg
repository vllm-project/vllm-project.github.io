<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="420" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">Qwen3-Omni optimization stack in vLLM-Omni</title>
  <desc id="desc">Optimization areas for Qwen3-Omni staged serving in vLLM-Omni.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 24px system-ui, -apple-system, Segoe UI, sans-serif; fill: #111827; }
      .node-text { font: 700 14px system-ui, -apple-system, Segoe UI, sans-serif; fill: #1f2937; }
      .node-sub { font: 500 12px system-ui, -apple-system, Segoe UI, sans-serif; fill: #475569; }
      .arrow { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 6 6; }
      .panel { fill: #fbf6ef; stroke: #eee1d2; }
      .blue { fill: #e8eef7; stroke: #b8c7dc; }
      .green { fill: #bfe7c7; stroke: #56b879; }
      .orange { fill: #f6c28b; stroke: #e39a4a; }
      .yellow { fill: #f8e7a5; stroke: #d9b441; }
    </style>
  </defs>

  <rect x="20" y="15" width="1240" height="390" rx="20" class="panel"/>
  <text x="50" y="58" class="title">Qwen3-Omni optimization stack</text>

  <rect x="75" y="140" width="155" height="64" rx="10" class="blue"/>
  <text x="97" y="166" class="node-text">Stage split</text>
  <text x="93" y="188" class="node-sub">Thinker / Talker / C2W</text>

  <rect x="285" y="140" width="155" height="64" rx="10" class="green"/>
  <text x="333" y="166" class="node-text">Batch</text>
  <text x="317" y="188" class="node-sub">AR + Code2Wav</text>

  <rect x="495" y="140" width="155" height="64" rx="10" class="orange"/>
  <text x="525" y="166" class="node-text">CUDA Graph</text>
  <text x="517" y="188" class="node-sub">stable chunks</text>

  <rect x="705" y="140" width="155" height="64" rx="10" class="yellow"/>
  <text x="745" y="166" class="node-text">Async chunk</text>
  <text x="732" y="188" class="node-sub">overlap IO + compute</text>

  <rect x="915" y="140" width="155" height="64" rx="10" class="green"/>
  <text x="949" y="166" class="node-text">Async output</text>
  <text x="936" y="188" class="node-sub">async omni output</text>

  <rect x="1125" y="140" width="135" height="64" rx="10" class="green"/>
  <text x="1159" y="166" class="node-text">Replicas</text>
  <text x="1146" y="188" class="node-sub">scale Talker / C2W</text>

  <rect x="520" y="290" width="185" height="64" rx="10" class="orange"/>
  <text x="556" y="316" class="node-text">Hot-path cleanup</text>
  <text x="553" y="338" class="node-sub">GPU-resident decode state</text>

  <path class="arrow" d="M 230 172 L 275 172"/>
  <path class="arrow" d="M 440 172 L 485 172"/>
  <path class="arrow" d="M 650 172 L 695 172"/>
  <path class="arrow" d="M 860 172 L 905 172"/>
  <path class="arrow" d="M 1070 172 L 1115 172"/>
  <path class="arrow dash" d="M 992 204 C 860 260 700 290 612 290"/>
</svg>
