<polyline class="line" stroke="#56b879" points="90.0,352.4 362.5,216.5 635.0,193.0 907.5,213.5 1180.0,147.8"/>
<circle cx="90.0" cy="352.4" r="5.5" fill="#bfe7c7" stroke="#56b879" stroke-width="2"/>
