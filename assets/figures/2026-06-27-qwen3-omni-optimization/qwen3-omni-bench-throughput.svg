<text x="80" y="114.0" text-anchor="end" class="tick">214</text>
<polyline class="line" stroke="#e39a4a" points="90.0,393.4 362.5,369.4 635.0,365.9 907.5,361.4 1180.0,359.2"/>
<circle cx="90.0" cy="393.4" r="5.5" fill="#f6c28b" stroke="#e39a4a" stroke-width="2"/>
