<text x="90.0" y="422" text-anchor="middle" class="xtick">Batch</text>
<text x="362.5" y="422" text-anchor="middle" class="xtick">CUDA</text>
<text x="362.5" y="436" text-anchor="middle" class="xtick">Graph</text>
<text x="635.0" y="422" text-anchor="middle" class="xtick">Async</text>
<text x="635.0" y="436" text-anchor="middle" class="xtick">chunk</text>
<text x="907.5" y="422" text-anchor="middle" class="xtick">Async</text>
<text x="907.5" y="436" text-anchor="middle" class="xtick">output</text>
<text x="1180.0" y="422" text-anchor="middle" class="xtick">Replicas</text>
</svg>
