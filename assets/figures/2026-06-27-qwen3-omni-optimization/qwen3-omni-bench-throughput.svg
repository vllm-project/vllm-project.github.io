<circle cx="362.5" cy="369.4" r="5.5" fill="#f6c28b" stroke="#e39a4a" stroke-width="2"/>
<text x="362.5" y="387.4" text-anchor="middle" class="val val-c1">22.5</text>
<circle cx="635.0" cy="365.9" r="5.5" fill="#f6c28b" stroke="#e39a4a" stroke-width="2"/>
<text x="635.0" y="383.9" text-anchor="middle" class="val val-c1">25.1</text>
<circle cx="907.5" cy="361.4" r="5.5" fill="#f6c28b" stroke="#e39a4a" stroke-width="2"/>
