<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="480" viewBox="0 0 1280 480" role="img">
<title>Request throughput (req/s) across optimization configs</title>
<defs><style>
.title{font:700 24px system-ui,-apple-system,Segoe UI,sans-serif;fill:#111827}
.panel{fill:#fbf6ef;stroke:#eee1d2}
.axis{stroke:#c9c1b6;stroke-width:1.4}
.grid{stroke:#e7ded2;stroke-width:1}
.tick{font:500 11px system-ui,-apple-system,Segoe UI,sans-serif;fill:#64748b}
.xtick{font:500 11px system-ui,-apple-system,Segoe UI,sans-serif;fill:#475569}
.legend{font:600 12px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155}
.val{font:600 10px system-ui,-apple-system,Segoe UI,sans-serif;fill:#334155}
.val-c1{fill:#b45309}
.val-c32{fill:#15803d}
.line{fill:none;stroke-width:3}
</style></defs>
<rect x="20" y="15" width="1240" height="450" rx="20" class="panel"/>
<text x="50" y="58" class="title">Request throughput (req/s) across optimization configs</text>
<line x1="920" y1="78" x2="948" y2="78" class="line" stroke="#e39a4a"/>
<text x="954" y="82" class="legend">c=1</text>
<line x1="1010" y1="78" x2="1038" y2="78" class="line" stroke="#56b879"/>
<text x="1044" y="82" class="legend">c=32</text>
