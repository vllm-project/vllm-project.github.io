    <rect x="94" y="109.2" width="80" height="220.8" fill="#fdb517"/>
    <text x="134" y="99" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">~23</text>
    <rect x="206" y="102.48" width="80" height="227.52" fill="#fdb517"/>
