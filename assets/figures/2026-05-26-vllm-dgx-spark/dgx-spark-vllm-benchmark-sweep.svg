  <!-- Scenario legend strip (full names) -->
  <g transform="translate(60,962)">
    <text x="0" y="0" font-size="13" font-weight="700" fill="#111827">Scenarios (prompt tok / gen tok):</text>
    <text x="0" y="20" font-size="13" fill="#111827">1. Judge call = typical judge call, real 20Q (58 / 2)</text>
    <text x="360" y="20" font-size="13" fill="#111827">2. Med / short = medium prompt, short gen (1834 / 32)</text>
    <text x="760" y="20" font-size="13" fill="#111827">3. Long / short = long prompt, short gen (7234 / 32)</text>
    <text x="0" y="40" font-size="13" fill="#111827">4. Med / long = medium prompt, long gen (1834 / 108)</text>
    <text x="360" y="40" font-size="13" fill="#111827">5. Long / long = long prompt, long gen (7234 / 124)</text>
  </g>

  <text x="60" y="1025" font-size="13" fill="#4b5563">Source: 5-scenario single-Spark eval on a local vLLM endpoint + Nemotron-3-Super-120B-A12B-NVFP4, current CUDA-graphs-enabled deployment path.</text>
</svg>
