    <rect x="94" y="313.2" width="80" height="16.8" fill="#76b900"/>
    <text x="134" y="303" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">140</text>
    <rect x="206" y="133.68" width="80" height="196.32" fill="#76b900"/>
    <text x="246" y="123" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">1636</text>
    <rect x="318" y="104.76" width="80" height="225.24" fill="#76b900"/>
    <text x="358" y="94" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">1877</text>
    <rect x="430" y="133.32" width="80" height="196.68" fill="#76b900"/>
    <text x="470" y="123" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">1639</text>
    <rect x="542" y="103.92" width="80" height="226.08" fill="#76b900"/>
    <text x="582" y="94" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">1884</text>

