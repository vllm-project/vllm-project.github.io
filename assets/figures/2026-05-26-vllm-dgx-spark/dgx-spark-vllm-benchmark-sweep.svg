    <rect x="318" y="266.88" width="80" height="63.12" fill="#30a2ff" opacity="0.55"/>
    <text x="358" y="256" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">~5.26</text>
    <rect x="430" y="261.12" width="80" height="68.88" fill="#30a2ff" opacity="0.55"/>
    <text x="470" y="250" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">~5.74</text>
    <rect x="542" y="218.88" width="80" height="111.12" fill="#30a2ff" opacity="0.55"/>
    <text x="582" y="208" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">~9.26</text>

    <g font-size="13" fill="#111827" text-anchor="middle">
      <text x="134" y="350">Judge call</text>
      <text x="134" y="366" fill="#4b5563">58 / 2</text>
      <text x="246" y="350">Med / short</text>
      <text x="246" y="366" fill="#4b5563">1834 / 32</text>
      <text x="358" y="350">Long / short</text>
      <text x="358" y="366" fill="#4b5563">7234 / 32</text>
      <text x="470" y="350">Med / long</text>
      <text x="470" y="366" fill="#4b5563">1834 / 108</text>
      <text x="582" y="350">Long / long</text>
      <text x="582" y="366" fill="#4b5563">7234 / 124</text>
    </g>
  </g>

  <!-- PANEL 3: Prefill throughput (bottom-left) -->
  <g transform="translate(60,560)">
    <rect x="0" y="0" width="650" height="380" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="20" y="32" font-size="22" font-weight="700" fill="#111827">Prefill throughput (tok/s)</text>
    <text x="20" y="54" font-size="13" fill="#4b5563">Rises with prompt length: ~140 to ~1880 tok/s</text>

    <line x1="70" y1="90" x2="70" y2="330" stroke="#111827" stroke-width="1.5"/>
    <line x1="70" y1="330" x2="630" y2="330" stroke="#111827" stroke-width="1.5"/>

    <g font-size="13" fill="#4b5563">
      <line x1="66" y1="330" x2="70" y2="330" stroke="#4b5563"/>
      <text x="60" y="334" text-anchor="end">0</text>
      <line x1="66" y1="270" x2="70" y2="270" stroke="#4b5563"/>
