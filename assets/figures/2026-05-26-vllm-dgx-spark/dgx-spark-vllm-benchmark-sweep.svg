<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 1040" font-family="Inter, Helvetica, Arial, sans-serif" role="img" aria-labelledby="title desc">
  <title id="title">vLLM on DGX Spark 5-scenario single-Spark evaluation sweep</title>
  <desc id="desc">Four-panel evaluation figure for vLLM serving Nemotron-3-Super-120B-A12B-NVFP4 on DGX Spark with the current CUDA-graphs-enabled deployment path. Top-left panel shows measured TTFT in seconds scaling with prompt length, roughly tripling from medium to long prompts. Top-right panel shows measured total end-to-end latency growing with both prompt and generation length. Bottom-left panel shows prefill throughput rising with prompt length from about 140 to about 1880 tokens per second. Bottom-right panel shows measured decode throughput staying within a narrow 22.7 to 23.7 tokens per second band across the five scenarios.</desc>
  <rect width="1440" height="1040" fill="#ffffff"/>

  <text x="60" y="48" font-size="30" font-weight="700" fill="#111827">vLLM on DGX Spark: 5-scenario single-Spark evaluation sweep</text>
  <text x="60" y="80" font-size="16" fill="#4b5563">Model: Nemotron-3-Super-120B-A12B-NVFP4 (NVFP4 weights), CUDA-graphs-enabled deployment</text>

  <g transform="translate(60,100)">
    <rect x="0" y="0" width="18" height="14" fill="#30a2ff"/>
    <text x="24" y="12" font-size="14" fill="#111827">TTFT (s)</text>
    <rect x="120" y="0" width="18" height="14" fill="#30a2ff" opacity="0.55"/>
    <text x="144" y="12" font-size="14" fill="#111827">Total latency (s)</text>
    <rect x="290" y="0" width="18" height="14" fill="#76b900"/>
    <text x="314" y="12" font-size="14" fill="#111827">Prefill throughput (tok/s)</text>
    <rect x="520" y="0" width="18" height="14" fill="#fdb517"/>
    <text x="544" y="12" font-size="14" fill="#111827">Decode throughput (tok/s)</text>
  </g>

  <!-- PANEL 1: TTFT (top-left) -->
  <g transform="translate(60,150)">
    <rect x="0" y="0" width="650" height="380" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="20" y="32" font-size="22" font-weight="700" fill="#111827">TTFT (seconds)</text>
    <text x="20" y="54" font-size="13" fill="#4b5563">Time to first token scales with prompt length</text>

    <line x1="70" y1="90" x2="70" y2="330" stroke="#111827" stroke-width="1.5"/>
    <line x1="70" y1="330" x2="630" y2="330" stroke="#111827" stroke-width="1.5"/>

    <g font-size="13" fill="#4b5563">
      <line x1="66" y1="330" x2="70" y2="330" stroke="#4b5563"/>
      <text x="60" y="334" text-anchor="end">0</text>
      <line x1="66" y1="270" x2="70" y2="270" stroke="#4b5563"/>
      <text x="60" y="274" text-anchor="end">1</text>
      <line x1="66" y1="210" x2="70" y2="210" stroke="#4b5563"/>
      <text x="60" y="214" text-anchor="end">2</text>
      <line x1="66" y1="150" x2="70" y2="150" stroke="#4b5563"/>
      <text x="60" y="154" text-anchor="end">3</text>
      <line x1="66" y1="90" x2="70" y2="90" stroke="#4b5563"/>
      <text x="60" y="94" text-anchor="end">4</text>
    </g>
    <text x="22" y="210" font-size="14" fill="#4b5563" transform="rotate(-90 22 210)" text-anchor="middle">seconds</text>

    <rect x="94" y="304.8" width="80" height="25.2" fill="#30a2ff"/>
    <text x="134" y="294" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">0.42</text>
    <rect x="206" y="262.8" width="80" height="67.2" fill="#30a2ff"/>
    <text x="246" y="252" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">1.12</text>
    <rect x="318" y="99" width="80" height="231" fill="#30a2ff"/>
    <text x="358" y="88" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">3.85</text>
    <rect x="430" y="262.8" width="80" height="67.2" fill="#30a2ff"/>
    <text x="470" y="252" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">1.12</text>
    <rect x="542" y="99.6" width="80" height="230.4" fill="#30a2ff"/>
    <text x="582" y="88" font-size="14" font-weight="600" fill="#111827" text-anchor="middle">3.84</text>

    <g font-size="13" fill="#111827" text-anchor="middle">
      <text x="134" y="350">Judge call</text>
      <text x="134" y="366" fill="#4b5563">58 / 2</text>
      <text x="246" y="350">Med prompt</text>
      <text x="246" y="366" fill="#4b5563">1834 / 32</text>
      <text x="358" y="350">Long prompt</text>
      <text x="358" y="366" fill="#4b5563">7234 / 32</text>
      <text x="470" y="350">Med prompt</text>
      <text x="470" y="366" fill="#4b5563">1834 / 108</text>
      <text x="582" y="350">Long prompt</text>
      <text x="582" y="366" fill="#4b5563">7234 / 124</text>
    </g>
  </g>

  <!-- PANEL 2: Total latency (top-right) -->
  <g transform="translate(734,150)">
    <rect x="0" y="0" width="650" height="380" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
    <text x="20" y="32" font-size="22" font-weight="700" fill="#111827">Total latency (seconds)</text>
    <text x="20" y="54" font-size="13" fill="#4b5563">End-to-end wall time per request, including generation</text>

    <line x1="70" y1="90" x2="70" y2="330" stroke="#111827" stroke-width="1.5"/>
    <line x1="70" y1="330" x2="630" y2="330" stroke="#111827" stroke-width="1.5"/>

    <g font-size="13" fill="#4b5563">
      <line x1="66" y1="330" x2="70" y2="330" stroke="#4b5563"/>
      <text x="60" y="334" text-anchor="end">0</text>
      <line x1="66" y1="270" x2="70" y2="270" stroke="#4b5563"/>
      <text x="60" y="274" text-anchor="end">5</text>
      <line x1="66" y1="210" x2="70" y2="210" stroke="#4b5563"/>
      <text x="60" y="214" text-anchor="end">10</text>
