  <text x="258" y="466" font-size="22" font-weight="700" fill="#1f2328" text-anchor="end">TP2</text>
  <text x="258" y="500" font-size="20" fill="#9ca3af" text-anchor="end">2 GPUs</text>
  <rect x="278" y="436" width="768.1" height="40" fill="#1a73e8"/>
