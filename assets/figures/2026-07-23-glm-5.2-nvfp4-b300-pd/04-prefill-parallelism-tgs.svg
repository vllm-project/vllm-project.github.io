    <text x="653" y="703">5K</text>
    <text x="1027" y="703">10K</text>
    <text x="1400" y="703">15K</text>
  </g>

  <!-- group 1: TP1 DP2 EP -->
  <text x="258" y="218" font-size="22" font-weight="700" fill="#1f2328" text-anchor="end">TP1 DP2 EP</text>
  <text x="258" y="252" font-size="20" fill="#9ca3af" text-anchor="end">2 GPUs</text>
  <rect x="278" y="188" width="969.6" height="40" fill="#1a73e8"/>
  <text x="1261.6" y="215" font-size="22" font-weight="700" fill="#1f2328">12,963</text>
  <rect x="278" y="238" width="934.4" height="40" fill="#e8542f"/>
  <text x="1226.4" y="265" font-size="22" font-weight="700" fill="#1f2328">12,493</text>

  <!-- group 2: TP2 DP1 EP -->
  <text x="258" y="342" font-size="22" font-weight="700" fill="#1f2328" text-anchor="end">TP2 DP1 EP</text>
  <text x="258" y="376" font-size="20" fill="#9ca3af" text-anchor="end">2 GPUs</text>
  <rect x="278" y="312" width="685.2" height="40" fill="#1a73e8"/>
  <text x="977.2" y="339" font-size="22" font-weight="700" fill="#1f2328">9,161</text>
  <rect x="278" y="362" width="661.8" height="40" fill="#e8542f"/>
  <text x="953.8" y="389" font-size="22" font-weight="700" fill="#1f2328">8,848</text>

