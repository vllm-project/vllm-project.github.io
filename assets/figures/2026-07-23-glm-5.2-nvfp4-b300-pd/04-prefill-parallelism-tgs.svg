<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1560 760" width="1560" height="760" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <rect x="0" y="0" width="1560" height="760" fill="#fbfbfa"/>

  <!-- title -->
  <text x="55" y="76" font-size="31" font-weight="700" fill="#1f2328">Prefill parallelism — per-GPU throughput (TGS)</text>
  <text x="55" y="120" font-size="21" fill="#6b7280">GLM-5.2-NVFP4 prefill · tok/s per GPU</text>

  <!-- legend -->
  <circle cx="1163" cy="112" r="8" fill="#1a73e8"/>
  <text x="1181" y="120" font-size="21" fill="#4b5563">8K input</text>
  <circle cx="1290" cy="112" r="8" fill="#e8542f"/>
  <text x="1308" y="120" font-size="21" fill="#4b5563">32K input</text>

  <!-- gridlines -->
  <g stroke="#e5e7eb" stroke-width="1.5">
    <line x1="278" y1="175" x2="278" y2="665"/>
    <line x1="653" y1="175" x2="653" y2="665"/>
    <line x1="1027" y1="175" x2="1027" y2="665"/>
    <line x1="1400" y1="175" x2="1400" y2="665"/>
  </g>
  <line x1="278" y1="665" x2="1400" y2="665" stroke="#d1d5db" stroke-width="1.5"/>

  <!-- x axis labels -->
