<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900">
  <defs>
    <filter id="cardShadow" x="-2%" y="-2%" width="104%" height="108%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="barBlue" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#30a2ff"/>
      <stop offset="100%" stop-color="#2b8fe0"/>
    </linearGradient>
  </defs>

  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
  </style>

  <!-- Background -->
  <rect width="1600" height="900" fill="#ffffff"/>

  <!-- ============================================ -->
  <!-- Title                                        -->
  <!-- ============================================ -->
  <rect x="0" y="0" width="1600" height="72" fill="#f8f8f8"/>
  <text x="60" y="46" fill="#1a1a2e" font-size="26" font-weight="700">Release-Candidate Validation</text>

  <!-- ============================================ -->
  <!-- Panel 1: Accuracy & Throughput (left)        -->
  <!-- ============================================ -->
  <g transform="translate(40, 96)">
    <!-- Card -->
    <rect x="0" y="0" width="740" height="680" rx="10" fill="#ffffff" stroke="#e2e2e8" stroke-width="1.2" filter="url(#cardShadow)"/>

    <!-- Header -->
    <rect x="0" y="0" width="740" height="52" rx="10" fill="#f8f8f8"/>
    <rect x="0" y="42" width="740" height="10" fill="#f8f8f8"/>
    <rect x="0" y="48" width="740" height="3" fill="#fdb517" opacity="0.5"/>
    <text x="28" y="34" fill="#1a1a2e" font-size="16" font-weight="700" letter-spacing="0.4">ACCURACY &amp; THROUGHPUT</text>

    <!-- ── Accuracy section ── -->
    <text x="28" y="96" fill="#6b7280" font-size="13" font-weight="600" letter-spacing="0.5">GSM8K ACCURACY</text>

    <!-- Strict Match -->
    <g transform="translate(28, 118)">
      <text x="0" y="16" fill="#4b5563" font-size="13" font-weight="500">Strict Match</text>
      <text x="684" y="16" fill="#1a1a2e" font-size="13" font-weight="700" text-anchor="end">91.51%</text>
      <rect x="0" y="28" width="684" height="28" rx="5" fill="#f0f0f4"/>
      <rect x="0" y="28" width="626" height="28" rx="5" fill="url(#barBlue)"/>
      <text x="612" y="47" fill="#ffffff" font-size="14" font-weight="700">91.51%</text>
    </g>

    <!-- Flexible Match -->
    <g transform="translate(28, 186)">
      <text x="0" y="16" fill="#4b5563" font-size="13" font-weight="500">Flexible Match</text>
      <text x="684" y="16" fill="#1a1a2e" font-size="13" font-weight="700" text-anchor="end">91.66%</text>
      <rect x="0" y="28" width="684" height="28" rx="5" fill="#f0f0f4"/>
      <rect x="0" y="28" width="627" height="28" rx="5" fill="url(#barBlue)"/>
      <text x="613" y="47" fill="#ffffff" font-size="14" font-weight="700">91.66%</text>
    </g>

    <!-- Delta chip -->
    <g transform="translate(28, 252)">
      <rect x="0" y="0" width="160" height="34" rx="6" fill="#f0f9ff" stroke="#30a2ff" stroke-width="0.8"/>
      <text x="14" y="22" fill="#30a2ff" font-size="13" font-weight="600">+0.15 pp flexible</text>
    </g>

    <!-- Divider -->
    <line x1="28" y1="316" x2="712" y2="316" stroke="#e8e8ec" stroke-width="1"/>

    <!-- ── Throughput section ── -->
    <text x="28" y="356" fill="#6b7280" font-size="13" font-weight="600" letter-spacing="0.5">SHAREGPT THROUGHPUT @ 256 REQUESTS</text>

    <!-- Output throughput -->
    <g transform="translate(28, 378)">
      <text x="0" y="18" fill="#9ca3af" font-size="12" font-weight="500">Output Throughput</text>
      <text x="0" y="78" fill="#1a1a2e" font-size="60" font-weight="800">8,530</text>
      <text x="270" y="78" fill="#6b7280" font-size="24" font-weight="400">tok/s</text>
      <!-- Thin progress bar -->
      <rect x="0" y="96" width="684" height="10" rx="3" fill="#f0f0f4"/>
      <rect x="0" y="96" width="580" height="10" rx="3" fill="url(#barBlue)"/>
    </g>

    <!-- TPOT -->
    <g transform="translate(28, 508)">
      <text x="0" y="18" fill="#9ca3af" font-size="12" font-weight="500">Time per Output Token (TPOT)</text>
      <text x="0" y="72" fill="#1a1a2e" font-size="52" font-weight="800">56.0</text>
      <text x="155" y="72" fill="#6b7280" font-size="22" font-weight="400">ms</text>
      <!-- Thin progress bar -->
      <rect x="0" y="90" width="684" height="10" rx="3" fill="#f0f0f4"/>
      <rect x="0" y="90" width="274" height="10" rx="3" fill="#fdb517"/>
      <text x="288" y="99" fill="#9ca3af" font-size="11" font-weight="400">lower is better</text>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- Panel 2: Speculative Decoding (right)        -->
  <!-- ============================================ -->
  <g transform="translate(820, 96)">
    <!-- Card -->
    <rect x="0" y="0" width="740" height="680" rx="10" fill="#ffffff" stroke="#e2e2e8" stroke-width="1.2" filter="url(#cardShadow)"/>

    <!-- Header -->
    <rect x="0" y="0" width="740" height="52" rx="10" fill="#f8f8f8"/>
    <rect x="0" y="42" width="740" height="10" fill="#f8f8f8"/>
    <rect x="0" y="48" width="740" height="3" fill="#fdb517" opacity="0.5"/>
    <text x="28" y="34" fill="#1a1a2e" font-size="16" font-weight="700" letter-spacing="0.4">SPECULATIVE DECODING</text>

    <!-- ── TPOT by concurrency ── -->
    <text x="28" y="96" fill="#6b7280" font-size="13" font-weight="600" letter-spacing="0.5">TPOT BY CONCURRENCY (SONNET WORKLOAD)</text>

    <!-- Bar chart -->
    <g transform="translate(60, 130)">
      <!-- Y-axis -->
      <line x1="0" y1="0" x2="0" y2="220" stroke="#d1d5db" stroke-width="1"/>
      <!-- Gridlines -->
      <text x="-10" y="5" fill="#9ca3af" font-size="11" text-anchor="end">16</text>
      <line x1="0" y1="0" x2="620" y2="0" stroke="#f0f0f4" stroke-width="1"/>
      <text x="-10" y="60" fill="#9ca3af" font-size="11" text-anchor="end">12</text>
      <line x1="0" y1="55" x2="620" y2="55" stroke="#f0f0f4" stroke-width="1"/>
      <text x="-10" y="115" fill="#9ca3af" font-size="11" text-anchor="end">8</text>
      <line x1="0" y1="110" x2="620" y2="110" stroke="#f0f0f4" stroke-width="1"/>
      <text x="-10" y="170" fill="#9ca3af" font-size="11" text-anchor="end">4</text>
      <line x1="0" y1="165" x2="620" y2="165" stroke="#f0f0f4" stroke-width="1"/>
      <text x="-10" y="225" fill="#9ca3af" font-size="11" text-anchor="end">0</text>
      <!-- X-axis -->
      <line x1="0" y1="220" x2="620" y2="220" stroke="#d1d5db" stroke-width="1"/>
      <!-- Y-axis label -->
      <text x="-38" y="110" fill="#6b7280" font-size="11" font-weight="500" text-anchor="middle" transform="rotate(-90, -38, 110)">ms</text>

      <!-- Bar 1: C=1, 4.51 ms -->
      <rect x="40" y="158" width="120" height="62" rx="4" fill="#30a2ff"/>
      <text x="100" y="150" fill="#1a1a2e" font-size="16" font-weight="700" text-anchor="middle">4.51 ms</text>
      <text x="100" y="244" fill="#4b5563" font-size="13" font-weight="600" text-anchor="middle">C = 1</text>

      <!-- Bar 2: C=16, 9.04 ms -->
      <rect x="240" y="96" width="120" height="124" rx="4" fill="#30a2ff"/>
      <text x="300" y="88" fill="#1a1a2e" font-size="16" font-weight="700" text-anchor="middle">9.04 ms</text>
      <text x="300" y="244" fill="#4b5563" font-size="13" font-weight="600" text-anchor="middle">C = 16</text>

      <!-- Bar 3: C=64, 14.36 ms -->
      <rect x="440" y="22" width="120" height="198" rx="4" fill="#30a2ff"/>
      <text x="500" y="14" fill="#1a1a2e" font-size="16" font-weight="700" text-anchor="middle">14.36 ms</text>
      <text x="500" y="244" fill="#4b5563" font-size="13" font-weight="600" text-anchor="middle">C = 64</text>
    </g>

    <!-- Divider -->
    <line x1="28" y1="424" x2="712" y2="424" stroke="#e8e8ec" stroke-width="1"/>

    <!-- ── Acceptance metrics ── -->
    <text x="28" y="464" fill="#6b7280" font-size="13" font-weight="600" letter-spacing="0.5">SPECULATIVE ACCEPTANCE</text>

    <!-- Two metric cards side by side -->
    <!-- Acceptance Rate card -->
    <g transform="translate(28, 488)">
      <rect x="0" y="0" width="328" height="160" rx="8" fill="#f8f8f8" stroke="#e2e2e8" stroke-width="1"/>
      <text x="24" y="36" fill="#9ca3af" font-size="12" font-weight="500">Acceptance Rate</text>
      <text x="24" y="100" fill="#1a1a2e" font-size="56" font-weight="800">~67%</text>
      <!-- Thin bar showing 67% -->
      <rect x="24" y="124" width="280" height="8" rx="3" fill="#f0f0f4"/>
      <rect x="24" y="124" width="188" height="8" rx="3" fill="url(#barBlue)"/>
    </g>

    <!-- Mean Accept Length card -->
    <g transform="translate(384, 488)">
      <rect x="0" y="0" width="328" height="160" rx="8" fill="#f8f8f8" stroke="#e2e2e8" stroke-width="1"/>
      <text x="24" y="36" fill="#9ca3af" font-size="12" font-weight="500">Mean Accept Length</text>
      <text x="24" y="100" fill="#1a1a2e" font-size="56" font-weight="800">~3.0</text>
      <text x="24" y="124" fill="#6b7280" font-size="14" font-weight="400">tokens per step</text>
      <!-- Token blocks -->
      <g transform="translate(24, 136)">
        <rect x="0" y="0" width="36" height="16" rx="3" fill="#30a2ff"/>
        <rect x="42" y="0" width="36" height="16" rx="3" fill="#30a2ff"/>
        <rect x="84" y="0" width="36" height="16" rx="3" fill="#30a2ff"/>
        <rect x="126" y="0" width="36" height="16" rx="3" fill="#e2e2e8" stroke="#d1d5db" stroke-width="0.5" stroke-dasharray="3,2"/>
      </g>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- Footer                                       -->
  <!-- ============================================ -->
  <g transform="translate(0, 810)">
    <rect x="0" y="0" width="1600" height="90" fill="#f8f8f8"/>
    <line x1="0" y1="0" x2="1600" y2="0" stroke="#e8e8ec" stroke-width="1"/>
    <text x="800" y="38" fill="#6b7280" font-size="14" font-weight="500" text-anchor="middle" letter-spacing="0.3">B300  ·  MiniMax-M3-MXFP8  ·  TP8+EP  ·  Release-Candidate Snapshot</text>
    <text x="800" y="62" fill="#9ca3af" font-size="12" font-weight="400" text-anchor="middle" font-style="italic">Engineering validation — not final public benchmark claims</text>
  </g>
</svg>